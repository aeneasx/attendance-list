<mat-progress-bar *ngIf="dataSource && !dataSource.data" mode="indeterminate"></mat-progress-bar>
<div *ngIf="dataSource && dataSource.data" class="loaderPlaceholder"></div>

<div class="quick-links" *ngIf="canUseApps">
  <a mat-stroked-button color="primary" *ngIf="bfaUrl" [href]="bfaUrl">
    <mat-icon>icecream</mat-icon>
    BFA
  </a>
  <a mat-stroked-button color="primary" *ngIf="fischmarktUrl" [href]="fischmarktUrl">
    <mat-icon>sailing</mat-icon>
    Fischmarkt
  </a>
</div>

<mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="example-tree">
  <mat-tree-node *matTreeNodeDef="let node" matTreeNodeToggle>
    <li class="mat-tree-node">
      <button mat-icon-button disabled></button>
      {{node.name}}
    </li>
  </mat-tree-node>
  <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild">
    <li>
      <div class="mat-tree-node">
        <button mat-icon-button matTreeNodeToggle [attr.aria-label]="'toggle ' + node.name">
          <mat-icon class="mat-icon-rtl-mirror">
            {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
          </mat-icon>
        </button>
        {{node.name}}
      </div>
      <ul [class.example-tree-invisible]="!treeControl.isExpanded(node)">
        <ng-container matTreeNodeOutlet></ng-container>
      </ul>
    </li>
  </mat-nested-tree-node>
</mat-tree>
